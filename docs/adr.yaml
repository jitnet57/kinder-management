- id: ADR-001
  title: 파스텔톤 글래스 모르피즘 디자인 시스템
  status: adopted
  date: 2026-04-26
  stacks: [frontend, tailwind, react]
  context: |
    아동교육 기관의 관리 시스템은 장시간 사용되는 환경에서 사용자 피로도를 최소화해야 한다.
    색상 선택이 임의적이면 UI 일관성이 떨어지고, 아동별 색상 구분이 명확하지 않으면 시각적 혼동이 발생한다.
    기존 웹 관리 시스템의 딱딱한 디자인은 교육 환경의 따뜻함을 전달하지 못한다.
  decision: |
    - 파스텔톤 색상 팔레트 (Purple, Teal, Pink) 사용
    - 글래스 모르피즘 (반투명 + 블러) 적용
    - 아동별 자동 색상 할당 (8가지 파스텔)
    - 호버 시 애니메이션으로 인터랙션 피드백
  consequence: |
    - 모든 새로운 컴포넌트는 .glass 클래스 사용
    - 색상 커스터마이징 시 tailwind.config에서 관리
    - 포토샵/디자인 툴 불필요 (Tailwind + CSS로 구현)

- id: ADR-002
  title: 프론트엔드 + 백엔드 분리 아키텍처
  status: adopted
  date: 2026-04-26
  stacks: [frontend, backend, nodejs]
  context: |
    초기에는 풀스택 한 저장소에서 시작하면 개발 속도가 빠를 수 있지만,
    팀이 커질수록 배포 파이프라인 복잡도가 증가한다.
    프론트엔드만 빠르게 반복해야 하는 상황에서 백엔드 빌드를 기다려야 하는 불편함이 발생한다.
  decision: |
    - frontend/ 와 backend/ 디렉토리 분리
    - FE: React 18 + TypeScript + Tailwind (Vercel 배포)
    - BE: Node.js + Hono + Prisma (Railway/Fly.io 배포)
    - API: REST (향후 GraphQL 검토)
  consequence: |
    - 로컬 개발 시 `npm run dev`가 FE/BE 독립적으로 실행
    - 환경 변수 관리가 .env.local로 분산
    - CI/CD 파이프라인이 각각 구성됨

- id: ADR-003
  title: 데이터 내보내기 (Excel/Word) 지원
  status: adopted
  date: 2026-04-26
  stacks: [frontend]
  context: |
    기관에서는 보고서 제출, 문서화, 공식 기록 보관을 위해 Excel/Word 형식이 필수다.
    PDF는 대안이 아니다 (수정 불가, 데이터 활용성 낮음).
    사용자가 매번 복사-붙여넣기로 수동 변환하는 것은 비효율적이다.
  decision: |
    - xlsx 라이브러리로 Excel 생성
    - docx 라이브러리로 Word 생성
    - 각 주요 페이지에 [Excel] [Word] 버튼 추가
    - 파일명에 생성 날짜 자동 포함
  consequence: |
    - 다운로드 기능이 FE 로컬에서 처리 (서버 비용 절감)
    - 대용량 데이터 export 시 스트리밍 구현 검토 필요
    - 사용자는 로컬 도구로 문서 편집 가능

- id: ADR-004
  title: PostgreSQL + Prisma ORM 선택
  status: adopted
  date: 2026-04-26
  stacks: [backend]
  context: |
    아동 정보, 세션 기록, 커리큘럼 등은 강한 관계형 구조를 가진다.
    MongoDB 같은 문서형 DB는 JOIN 복잡도가 높고, 트랜잭션 보장이 약하다.
    마이그레이션 관리가 자동화되어야 한다.
  decision: |
    - DBMS: PostgreSQL 14+
    - ORM: Prisma (타입 안전 + 마이그레이션 자동화)
    - 호스팅: Supabase (관리형 PostgreSQL)
    - 마이그레이션: prisma migrate (수동 SQL 금지)
  consequence: |
    - 스키마 변경 시 `npx prisma migrate dev` 사용
    - 기존 데이터 마이그레이션 시 seed.ts 작성
    - 프로덕션 배포 전 `prisma migrate deploy` 필수

- id: ADR-005
  title: 아동별 색상 자동 할당 시스템
  status: adopted
  date: 2026-04-26
  stacks: [frontend]
  context: |
    스케줄 시간표에서 아동을 시각적으로 구분하려면 각각 고유한 색상이 필요하다.
    관리자가 수동으로 색상을 선택하면 일관성이 떨어지고, 중복 색상 선택 가능성이 있다.
  decision: |
    - 미리 정의된 8가지 파스텔 색상 팔레트 사용
    - 아동 생성 시 등록 순서대로 순환 배정
    - 색상은 Child 테이블에 저장 (변경 가능)
  consequence: |
    - 색상 배정 로직은 백엔드에서 관리 (일관성 보증)
    - 사용자가 나중에 색상 변경 가능 (UI 제공)
    - 9명 이상 아동 등록 시 색상 순환 반복

- id: ADR-006
  title: 커리큘럼 계층 구조 (Domain > LTO > STO)
  status: adopted
  date: 2026-04-26
  stacks: [backend, frontend]
  context: |
    ABA 기반 교육에서 학습 목표는 계층적이다:
    - 발달영역 (Language, Cognition, Social) - 최상위
    - LTO (Long-Term Objective) - 3-6개월 목표
    - STO (Short-Term Objective) - 1-2주 목표
    세션 기록과 커리큘럼을 양방향으로 연동해야 한다.
  decision: |
    - Curriculum 테이블에 domain, lto, sto 필드 저장
    - SessionLog에서 curriculumId로 참조
    - UI: 트리 뷰로 계층 표현 (확장/축소 가능)
    - API: GET /curriculum?domain=xxx 로 필터링
  consequence: |
    - 커리큘럼 추가/수정은 관리자만 가능
    - 삭제 시 참조하는 세션 로그 확인 필요
    - 50개 이상 커리큘럼 지원 필요시 페이지네이션 추가

- id: ADR-007
  title: 일일 데이터 기록 + 7일 추세 그래프
  status: adopted
  date: 2026-04-26
  stacks: [frontend, backend]
  context: |
    세션 진행도를 수치화하고 시각화해야 한다.
    관리자는 아동별 학습 곡선을 빠르게 파악해야 한다.
    그래프는 실시간으로 업데이트되어야 한다.
  decision: |
    - SessionLog에 date, score (0-100), notes 저장
    - 그래프는 기본 7일 추세 (X: 날짜, Y: 점수)
    - Recharts 라이브러리 사용 (가볍고 반응형)
    - 백엔드에서 aggregation 처리하지 않음 (FE에서 필터)
  consequence: |
    - SessionLog 쿼리 성능을 위해 (childId, date) 인덱스 필요
    - 장기 분석 (30일 이상)을 원하면 API에 days 파라미터 추가
    - 그래프 export 기능은 추후 구현

- id: ADR-008
  title: 코드 리뷰 자동화 (MAFIA 하네스)
  status: adopted
  date: 2026-04-26
  stacks: [all]
  context: |
    팀 규모가 커지면서 코드 리뷰가 병목이 될 수 있다.
    평가 기준이 명확하지 않으면 리뷰이 불만족할 수 있다.
    설계의도 문서가 없으면 리뷰 깊이가 얕아진다.
  decision: |
    - Claude Code 기반 마피아 코드리뷰 하네스 도입
    - docs/code-convention.yaml: 코딩 스타일 규칙
    - docs/adr.yaml: 아키텍처 결정 기록
    - /mafia-codereview:auto 명령어로 자동화 파이프라인 실행
  consequence: |
    - PR 마다 평가기준 자동 생성 (설계와 일관성 확인)
    - 리뷰어 수동 작업 60% 감소
    - 코드 컨벤션 위반 자동 감지
    - 아키텍처 결정과 코드의 일관성 유지

- id: ADR-009
  title: 일자별 자동 데이터 백업 전략
  status: adopted
  date: 2026-04-26
  stacks: [backend, database]
  context: |
    아동 정보, 세션 기록, 커리큘럼은 교육 기관의 필수 자산이다.
    데이터 손실 시 기관 운영이 불가능하고 법적 책임이 발생한다.
    사용자가 수동으로 백업하면 일관성이 없고 누락 위험이 있다.
    매일 일정 시간에 자동으로 데이터를 안전하게 보관해야 한다.
  decision: |
    - 매일 자정(UTC+9) 자동 백업 실행
    - 3가지 백업 레벨:
      1) Supabase 관리형 백업 (DB 레벨, 14일 보관)
      2) PostgreSQL 전체 덤프 (JSON + SQL, S3 저장, 30일 보관)
      3) 애플리케이션 레벨 스냅샷 (모든 테이블 JSON, Supabase Storage)
    - 백업 파일명: kinder-backup-YYYY-MM-DD.tar.gz
    - 백업 성공/실패 알림 (관리자 이메일)
    - 복구 절차 문서화 및 월 1회 복구 테스트
  consequence: |
    - 매일 자정에 cron 작업 실행 (Hono 백엔드에서 관리)
    - 백업 스토리지 비용 월 $10-20 추가
    - 장애 발생 시 최대 24시간 데이터 손실 제한
    - 준법성: 한국 교육기관 데이터 보호 규정 준수
